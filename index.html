<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Flipkart</div>
        <ul class="nav-links">
            <li><a href="#">Electronics</a></li>
            <li><a href="#">Fashion</a></li>
            <li><a href="#">Home</a></li>
            <li><a href="#">Appliances</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="login-btn">Login</button>
            <button class="cart-btn">Cart 🛒</button>
        </div>
    </nav>

    <!-- Banner -->
    <section class="banner">
        <h1>Big Billion Days Sale</h1>
        <p>Up to 70% Off on Electronics, Fashion, and More!</p>
        <button class="shop-now">Shop Now</button>
    </section>

    <!-- Featured Products -->
    <section class="products">
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Smartphone">
            <h3>Smartphone</h3>
            <p class="price">₹14,999</p>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Laptop">
            <h3>Laptop</h3>
            <p class="price">₹49,999</p>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Headphones">
            <h3>Headphones</h3>
            <p class="price">₹1,999</p>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Smart Watch">
            <h3>Smart Watch</h3>
            <p class="price">₹2,499</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Flipkart Clone. All rights reserved.</p>
    </footer>

</body>
</html>
